server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Mirrors the Vite dev-server proxy so the frontend can keep calling
    # relative /chat and /health regardless of build mode — same-origin from
    # the browser's perspective, forwarded server-side to the backend
    # container. SSE responses must not be buffered or they won't stream.
    location /chat {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
